<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo App - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg">
        <div class="glass-container">
            <div class="logo-area">
                <div class="logo">TaskFlow</div>
                <h1 class="app-title">Welcome to TaskFlow</h1>
                <p class="subtitle">Your intelligent todo companion</p>
            </div>

            <div class="auth-tabs">
                <button id="loginTab" class="tab-btn active">Login</button>
                <button id="signupTab" class="tab-btn">Signup</button>
            </div>

            <div id="loginForm" class="auth-form">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Email Address" required>
                    <span class="error-message" id="loginEmailError"></span>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember Me
                    </label>
                </div>
                <button id="loginBtn" class="btn btn-primary">
                    <span id="loginBtnText">Login</span>
                    <span id="loginSpinner" class="spinner hidden">...</span>
                </button>
                <div id="loginMessage" class="message-area"></div>
            </div>

            <div id="signupForm" class="auth-form hidden">
                <div class="form-group">
                    <input type="email" id="signupEmail" placeholder="Email Address" required>
                    <span class="error-message" id="signupEmailError"></span>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder="Password (min 8 chars)" required>
                    <span class="error-message" id="signupPasswordError"></span>
                </div>
                <button id="signupBtn" class="btn btn-primary">
                    <span id="signupBtnText">Sign Up</span>
                    <span id="signupSpinner" class="spinner hidden">...</span>
                </button>
                <div id="signupMessage" class="message-area"></div>
                
                <div id="confirmationSection" class="hidden">
                    <h3>Check Your Email</h3>
                    <p class="confirmation-text">Enter the verification code sent to your email</p>
                    <div class="form-group">
                        <input type="text" id="confirmationCode" placeholder="6-digit Code" maxlength="6" required>
                        <span class="error-message" id="confirmationCodeError"></span>
                    </div>
                    <button id="confirmBtn" class="btn btn-primary">
                        <span id="confirmBtnText">Verify</span>
                        <span id="confirmSpinner" class="spinner hidden">...</span>
                    </button>
                    <div id="confirmationMessage" class="message-area"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2024 TaskFlow. All rights reserved.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@latest/dist/amazon-cognito-identity.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
